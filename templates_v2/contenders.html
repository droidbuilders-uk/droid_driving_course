<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Droid Control V2</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <script src="/static/tailwindcss-browser-4.js"></script>
    <link href="/static/fonts.css" rel="stylesheet">
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Exo 2', sans-serif;
        }
        .search-input { @apply w-full bg-black/40 border border-slate-800 p-4 text-white font-bold placeholder-slate-700 focus:outline-none focus:border-teal-500 transition-all; }
        .list-container { @apply bg-slate-900 border border-slate-800 h-[500px] overflow-y-auto; }
        .reg-btn { @apply px-4 py-2 bg-slate-800 border border-slate-700 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:bg-teal-500 hover:text-black hover:border-teal-400 transition-all; }
    </style>
</head>
<body class="bg-[#05070a] text-slate-100 min-h-screen font-sans antialiased p-8 md:p-12">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12 pb-6 border-b border-slate-900">
            <div>
                <a href="/" class="text-teal-500 font-bold text-xs tracking-widest uppercase mb-4 block hover:translate-x-1 transition-transform">← Back to Dashboard</a>
                <h1 class="text-4xl font-black text-white uppercase tracking-tight">Manual Registration</h1>
            </div>
            
            <div id="active-selection" class="bg-slate-900 px-8 py-4 border-l-4 border-amber-500 shadow-xl flex gap-12">
                <div>
                    <div class="text-[10px] text-slate-600 font-bold uppercase mb-1">Current Builder</div>
                    <div id="active-member" class="font-black text-white uppercase">---</div>
                </div>
                <div>
                    <div class="text-[10px] text-slate-600 font-bold uppercase mb-1">Current Droid</div>
                    <div id="active-droid" class="font-black text-amber-500 uppercase">---</div>
                </div>
                <div class="flex items-center ml-4">
                    <button onclick="resetSession()" class="px-4 py-2 border border-rose-500/50 text-rose-500 text-[10px] font-black uppercase tracking-widest hover:bg-rose-500 hover:text-white transition-all">Clear</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Builder Selection -->
            <div class="space-y-4">
                <div class="flex justify-between items-end mb-2">
                    <h2 class="text-lg font-black text-white uppercase tracking-widest">1. Select Builder</h2>
                    <input type="text" id="member-search" placeholder="Search Builders..." class="w-64 bg-black/40 border border-slate-800 px-4 py-2 text-sm focus:outline-none focus:border-teal-500">
                </div>
                <div class="list-container">
                    <table class="w-full text-left">
                        <tbody id="member-list">
                            <!-- Members injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Droid Selection -->
            <div class="space-y-4">
                <div class="flex justify-between items-end mb-2">
                    <h2 class="text-lg font-black text-white uppercase tracking-widest">2. Select Droid</h2>
                    <input type="text" id="droid-search" placeholder="Search Droids..." class="w-64 bg-black/40 border border-slate-800 px-4 py-2 text-sm focus:outline-none focus:border-teal-500">
                </div>
                <div class="list-container">
                    <table class="w-full text-left">
                        <tbody id="droid-list">
                            <!-- Droids injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        function connectWS() {
            ws = new WebSocket(`ws://${window.location.host}/ws/comms`);
            ws.onopen = () => console.log("WebSocket Connected");
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                console.log("Update received:", msg.event);
                if (msg.event === 'reload_contender') updateSelection();
            };
            ws.onclose = () => {
                console.log("WebSocket Disconnected - Retrying in 2s...");
                setTimeout(connectWS, 2000);
            };
        }

        let members = [];
        let droids = [];

        async function init() {
            const [mRes, dRes] = await Promise.all([
                fetch('/display/members'),
                fetch('/display/droids')
            ]);
            members = await mRes.json();
            droids = await dRes.json();
            
            renderMembers();
            renderDroids();
            updateSelection();
        }

        function renderMembers(filter = '') {
            const list = document.getElementById('member-list');
            list.innerHTML = members
                .filter(m => m.name.toLowerCase().includes(filter.toLowerCase()))
                .map(m => `
                    <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors">
                        <td class="p-4 font-black text-white uppercase text-sm">${m.name}</td>
                        <td class="p-4 text-right">
                            <button onclick="register('member', '${m.member_uid}')" class="reg-btn">Select</button>
                        </td>
                    </tr>
                `).join('');
        }

        function renderDroids(filter = '') {
            const list = document.getElementById('droid-list');
            list.innerHTML = droids
                .filter(d => d.droid_name.toLowerCase().includes(filter.toLowerCase()))
                .map(d => `
                    <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors">
                        <td class="p-4 font-black text-amber-500 uppercase text-sm">${d.droid_name}</td>
                        <td class="p-4 text-right">
                            <button onclick="register('droid', '${d.droid_uid}')" class="reg-btn">Select</button>
                        </td>
                    </tr>
                `).join('');
        }

        async function register(type, uid) {
            await fetch(`/${type}/${uid}`);
        }

        async function resetSession() {
            if(confirm("Clear current selection?")) {
                await fetch('/admin/reset');
            }
        }

        async function updateSelection() {
            const res = await fetch('/display/contender');
            const data = await res.json();
            document.getElementById('active-member').textContent = data.member || "None Selected";
            document.getElementById('active-droid').textContent = data.droid || "Waiting...";
        }

        document.getElementById('member-search').addEventListener('input', (e) => renderMembers(e.target.value));
        document.getElementById('droid-search').addEventListener('input', (e) => renderDroids(e.target.value));

        init();
        connectWS();
    </script>
</body>
</html>
